name: Paint contribution graph

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contribution-art
  cancel-in-progress: false

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Plan and add adaptive contribution pixels
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./paint.sh sync

      - name: Push new commits
        run: |
          git fetch origin main
          git rebase --empty=keep origin/main
          git push origin HEAD:main
