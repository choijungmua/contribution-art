name: Paint contribution graph

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contribution-art
  cancel-in-progress: false

jobs:
  paint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Add today's contribution pixels
        run: ./paint.sh today

      - name: Push new commits
        run: git push origin HEAD:main
